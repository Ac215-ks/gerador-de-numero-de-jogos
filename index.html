<script>
    // 1. DATAS DINÂMICAS DA SEMANA PASSADA
    function getUltimas4Datas(diasSemana) {
        let datas = [];
        let dataAtual = new Date();
        while (datas.length < 4) {
            if (diasSemana.includes(dataAtual.getDay())) {
                datas.push(dataAtual.toLocaleDateString('pt-PT', { weekday: 'short', day: '2-digit', month: '2-digit' }));
            }
            dataAtual.setDate(dataAtual.getDate() - 1);
        }
        return datas;
    }

    // 2. DADOS DOS SORTEIOS (Simulação de API)
    const sorteiosData = {
        euromilhoes: [
            { data: getUltimas4Datas([2, 5])[0], numeros: [7, 14, 23, 31, 42], estrelas: [3, 9] },
            { data: getUltimas4Datas([2, 5])[1], numeros: [5, 18, 27, 33, 48], estrelas: [2, 11] },
            { data: getUltimas4Datas([2, 5])[2], numeros: [12, 19, 25, 36, 44], estrelas: [5, 8] },
            { data: getUltimas4Datas([2, 5])[3], numeros: [3, 16, 29, 38, 47], estrelas: [1, 12] }
        ],
        totoloto: [
            { data: getUltimas4Datas([3, 6])[0], numeros: [5, 12, 28, 33, 41], estrela: 7 },
            { data: getUltimas4Datas([3, 6])[1], numeros: [8, 15, 22, 37, 45], estrela: 3 },
            { data: getUltimas4Datas([3, 6])[2], numeros: [11, 19, 26, 34, 49], estrela: 11 },
            { data: getUltimas4Datas([3, 6])[3], numeros: [2, 14, 23, 39, 46], estrela: 5 }
        ],
        eurodreams: [
            { data: getUltimas4Datas([1, 4])[0], numeros: [8, 15, 22, 29, 35, 40], sonho: 3 },
            { data: getUltimas4Datas([1, 4])[1], numeros: [4, 12, 18, 27, 33, 38], sonho: 1 },
            { data: getUltimas4Datas([1, 4])[2], numeros: [6, 14, 21, 28, 36, 41], sonho: 5 },
            { data: getUltimas4Datas([1, 4])[3], numeros: [9, 17, 24, 31, 37, 39], sonho: 2 }
        ],
        m1lhao: [
            { data: getUltimas4Datas([1, 3, 6])[0], codigo: 'XYZ1234' },
            { data: getUltimas4Datas([1, 3, 6])[1], codigo: 'ABC5678' },
            { data: getUltimas4Datas([1, 3, 6])[2], codigo: 'DEF9012' },
            { data: getUltimas4Datas([1, 3, 6])[3], codigo: 'GHI3456' }
        ]
    };

    // 3. NAVEGAÇÃO
    function showView(viewId) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.getElementById('nav-' + viewId).classList.add('active');
        window.scrollTo(0, 0);
    }

    // 4. FUNÇÃO PARA RENDERIZAR BOLINHAS NO DASHBOARD (CORRIGIDA)
    function atualizarResultadosDashboard() {
        // USAR getElementById PARA CADA CONTAINER ESPECÍFICO
        const euroNum = document.getElementById("dash-euro-numeros");
        const euroEst = document.getElementById("dash-euro-estrelas");
        const totoNum = document.getElementById("dash-toto-numeros");
        const totoEst = document.getElementById("dash-toto-estrelas");
        const dreamNum = document.getElementById("dash-dream-numeros");
        const dreamEst = document.getElementById("dash-dream-estrelas");

        // Preencher Euromilhões
        if (euroNum && euroEst) {
            const ultEuro = sorteiosData.euromilhoes[0];
            let htmlEuroNum = '';
            ultEuro.numeros.forEach(num => {
                htmlEuroNum += `<div class="bolinha">${num}</div>`;
            });
            euroNum.innerHTML = htmlEuroNum;

            let htmlEuroEst = '';
            ultEuro.estrelas.forEach(est => {
                htmlEuroEst += `<div class="bolinha estrela">${est}</div>`;
            });
            euroEst.innerHTML = htmlEuroEst;
        }

        // Preencher Totoloto
        if (totoNum && totoEst) {
            const ultToto = sorteiosData.totoloto[0];
            let htmlTotoNum = '';
            ultToto.numeros.forEach(num => {
                htmlTotoNum += `<div class="bolinha">${num}</div>`;
            });
            totoNum.innerHTML = htmlTotoNum;
            totoEst.innerHTML = `<div class="bolinha estrela">${ultToto.estrela}</div>`;
        }

        // Preencher EuroDreams
        if (dreamNum && dreamEst) {
            const ultDream = sorteiosData.eurodreams[0];
            let htmlDreamNum = '';
            ultDream.numeros.forEach(num => {
                htmlDreamNum += `<div class="bolinha">${num}</div>`;
            });
            dreamNum.innerHTML = htmlDreamNum;
            dreamEst.innerHTML = `<div class="bolinha estrela">${ultDream.sonho}</div>`;
        }
    }

    // 5. RENDERIZAR HISTÓRICO DE SORTEIOS
    function renderizarSorteios() {
        const render = (id, data, tipo) => {
            const container = document.getElementById(id);
            if (!container) return;
            container.innerHTML = data.map(s => {
                let extra = '';
                if (tipo === 'euro') extra = `<div class="contentor-bolinhas">${s.estrelas.map(e => `<div class="bolinha estrela">${e}</div>`).join('')}</div>`;
                else if (tipo === 'toto') extra = `<div class="contentor-bolinhas"><div class="bolinha estrela" title="Número da Sorte">${s.estrela}</div></div>`;
                else if (tipo === 'dream') extra = `<div class="contentor-bolinhas"><div class="bolinha estrela" title="Número Sonho">${s.sonho}</div></div>`;
                else if (tipo === 'm1') extra = `<div style="font-size: 2rem; font-weight: bold; color: var(--accent); letter-spacing: 3px; margin: 15px 0; text-align:center;">${s.codigo}</div>`;
                
                return `<div class="sorteio-card"><h4>Sorteio de ${s.data}</h4>
                    <div class="contentor-bolinhas" style="margin: 10px 0;">${s.numeros.map(n => `<div class="bolinha">${n}</div>`).join('')}</div>
                    ${extra}</div>`;
            }).join('');
        };
        
        render('euro-sorteios', sorteiosData.euromilhoes, 'euro');
        render('toto-sorteios', sorteiosData.totoloto, 'toto');
        render('dream-sorteios', sorteiosData.eurodreams, 'dream');
        render('m1lhao-sorteios', sorteiosData.m1lhao, 'm1');
    }

    // 6. CONTADOR REGRESSIVO
    function atualizarContadores() {
        const agora = new Date();
        const jogos = {
            'euromilhoes': { dias: [2, 5], hora: 20, min: 0 },
            'totoloto': { dias: [3, 6], hora: 20, min: 0 },
            'eurodreams': { dias: [1, 4], hora: 21, min: 0 },
            'm1lhao': { dias: [1, 3, 6], hora: 21, min: 0 }
        };
        for (const [jogo, config] of Object.entries(jogos)) {
            let proximo = new Date(agora);
            proximo.setHours(config.hora, config.min, 0, 0);
            for (let i = 0; i < 8; i++) {
                if (config.dias.includes(proximo.getDay()) && proximo > agora) break;
                proximo.setDate(proximo.getDate() + 1);
            }
            const diff = proximo - agora;
            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);
            const el = document.getElementById(`countdown-${jogo}`);
            if (el) el.innerText = `${d}d ${h}h ${m}m ${s}s`;
        }
    }
    setInterval(atualizarContadores, 1000);
    atualizarContadores();

    // 7. GERADOR DE CHAVE COM IA E ANIMAÇÃO
    function gerarChave(tipo) {
        const prefix = tipo === 'euromilhoes' ? 'euro' : (tipo === 'totoloto' ? 'toto' : 'dream');
        const numContainer = document.getElementById(prefix + '-numeros');
        const estContainer = document.getElementById(prefix + '-estrelas');
        
        numContainer.innerHTML = '<div class="ai-loading"><div class="spinner"></div> A IA está a analisar padrões...</div>';
        estContainer.innerHTML = '';
        const oldBtn = document.getElementById('btn-salvar-dinamico');
        if(oldBtn) oldBtn.remove();

        setTimeout(() => {
            let maxNum, qtdNum, maxEst, qtdEst;
            if (tipo === 'euromilhoes') { maxNum = 50; qtdNum = 5; maxEst = 12; qtdEst = 2; }
            else if (tipo === 'totoloto') { maxNum = 49; qtdNum = 5; maxEst = 13; qtdEst = 1; }
            else if (tipo === 'eurodreams') { maxNum = 40; qtdNum = 6; maxEst = 5; qtdEst = 1; }

            let historico = sorteiosData[tipo];
            let freqNum = {}, freqEst = {};
            historico.forEach(s => {
                s.numeros.forEach(n => freqNum[n] = (freqNum[n] || 0) + 1);
                if (tipo === 'euromilhoes') s.estrelas.forEach(e => freqEst[e] = (freqEst[e] || 0) + 1);
                else if (tipo === 'totoloto') freqEst[s.estrela] = (freqEst[s.estrela] || 0) + 1;
                else if (tipo === 'eurodreams') freqEst[s.sonho] = (freqEst[s.sonho] || 0) + 1;
            });

            let poolNum = [], poolEst = [];
            for (let i = 1; i <= maxNum; i++) {
                let peso = freqNum[i] ? (freqNum[i] * 3) : 1;
                for (let p = 0; p < peso; p++) poolNum.push(i);
            }
            for (let i = 1; i <= maxEst; i++) {
                let peso = freqEst[i] ? (freqEst[i] * 3) : 1;
                for (let p = 0; p < peso; p++) poolEst.push(i);
            }

            let numeros = [], estrelas = [];
            while (numeros.length < qtdNum) {
                let n = poolNum[Math.floor(Math.random() * poolNum.length)];
                if (!numeros.includes(n)) numeros.push(n);
            }
            while (estrelas.length < qtdEst) {
                let e = poolEst[Math.floor(Math.random() * poolEst.length)];
                if (!estrelas.includes(e)) estrelas.push(e);
            }
            numeros.sort((a, b) => a - b);
            estrelas.sort((a, b) => a - b);

            numContainer.innerHTML = numeros.map(n => `<div class="bolinha">${n}</div>`).join('');
            estContainer.innerHTML = estrelas.map(e => `<div class="bolinha estrela">${e}</div>`).join('');
            numContainer.classList.add('numeros-gerados-animacao');
            estContainer.classList.add('numeros-gerados-animacao');

            const btnSalvar = document.createElement('button');
            btnSalvar.id = 'btn-salvar-dinamico';
            btnSalvar.className = 'btn';
            btnSalvar.style.marginTop = '20px';
            btnSalvar.style.backgroundColor = 'var(--bg-card)';
            btnSalvar.style.color = 'var(--text-primary)';
            btnSalvar.style.border = '1px solid #e5e7eb';
            btnSalvar.innerHTML = '<i class="fas fa-bookmark"></i> Salvar esta Chave';
            btnSalvar.onclick = () => salvarChaveFavorita(tipo);
            
            estContainer.parentNode.appendChild(btnSalvar);
            mostrarToast('🧠 Chave otimizada pela IA com sucesso!');
        }, 1500);
    }

    // 8. FAVORITOS E TOAST
    function mostrarToast(mensagem) {
        const toast = document.getElementById('toast-notificacao');
        document.getElementById('toast-mensagem').innerText = mensagem;
        toast.style.display = 'flex';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function salvarChaveFavorita(tipo) {
        const prefix = tipo === 'euromilhoes' ? 'euro' : (tipo === 'totoloto' ? 'toto' : 'dream');
        const numContainer = document.getElementById(prefix + '-numeros');
        const estContainer = document.getElementById(prefix + '-estrelas');
        if (!numContainer) return;

        let nums = Array.from(numContainer.children).map(el => el.innerText);
        let ests = Array.from(estContainer.children).map(el => el.innerText);
        let nomeJogo = tipo === 'euromilhoes' ? 'Euromilhões' : (tipo === 'totoloto' ? 'Totoloto' : 'EuroDreams');

        let favoritos = JSON.parse(localStorage.getItem('claudioAI_favoritos')) || [];
        favoritos.unshift({ jogo: nomeJogo, numeros: nums, estrelas: ests, data: new Date().toLocaleDateString('pt-PT') });
        localStorage.setItem('claudioAI_favoritos', JSON.stringify(favoritos));
        
        mostrarToast('✅ Chave salva nos favoritos!');
        renderizarFavoritos();
    }

    function renderizarFavoritos() {
        const container = document.getElementById('lista-favoritos');
        let favoritos = JSON.parse(localStorage.getItem('claudioAI_favoritos')) || [];
        if (favoritos.length === 0) {
            container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Nenhuma chave salva.</p>';
            return;
        }
        container.innerHTML = favoritos.map((f, index) => `
            <div class="sorteio-card">
                <h4>${f.jogo} <small style="color: var(--text-secondary);">(${f.data})</small></h4>
                <div class="contentor-bolinhas" style="margin: 10px 0;">${f.numeros.map(n => `<div class="bolinha" style="width:30px;height:30px;font-size:0.9rem;">${n}</div>`).join('')}</div>
                ${f.estrelas.length > 0 ? `<div class="contentor-bolinhas">${f.estrelas.map(e => `<div class="bolinha estrela" style="width:30px;height:30px;font-size:0.9rem;">${e}</div>`).join('')}</div>` : ''}
                <button class="btn" style="background-color: #ef4444; margin-top: 10px; padding: 8px;" onclick="removerFavorito(${index})">Remover</button>
            </div>`).join('');
    }

    function removerFavorito(index) {
        let favoritos = JSON.parse(localStorage.getItem('claudioAI_favoritos')) || [];
        favoritos.splice(index, 1);
        localStorage.setItem('claudioAI_favoritos', JSON.stringify(favoritos));
        renderizarFavoritos();
    }

    function limparFavoritos() {
        if(confirm('Apagar todas as chaves salvas?')) {
            localStorage.removeItem('claudioAI_favoritos');
            renderizarFavoritos();
            mostrarToast('🗑️ Favoritos limpos.');
        }
    }

    // 9. INICIALIZAÇÃO - CHAMA AS FUNÇÕES AO CARREGAR A PÁGINA
    document.addEventListener('DOMContentLoaded', function() {
        atualizarResultadosDashboard(); // ✅ Renderiza as bolinhas no dashboard
        renderizarSorteios();           // ✅ Renderiza o histórico de sorteios
        renderizarFavoritos();          // ✅ Renderiza os favoritos salvos
    });
</script>
