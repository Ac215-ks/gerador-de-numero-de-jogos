<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claudio AI Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-card: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --sidebar-width: 260px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-primary); display: flex; min-height: 100vh; }

        .sidebar { width: var(--sidebar-width); background-color: var(--bg-secondary); padding: 20px; position: fixed; height: 100vh; border-right: 1px solid #334155; display: flex; flex-direction: column; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--accent); margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .nav-links { list-style: none; flex: 1; overflow-y: auto; }
        .nav-links li { margin-bottom: 10px; }
        .nav-links a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-secondary); text-decoration: none; border-radius: 8px; transition: all 0.3s ease; cursor: pointer; }
        .nav-links a:hover, .nav-links a.active { background-color: var(--accent); color: white; }

        .main-content { margin-left: var(--sidebar-width); flex: 1; padding: 30px; width: 100%; }
        .header { margin-bottom: 30px; }
        .header h1 { font-size: 2rem; margin-bottom: 10px; }
        
        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--bg-secondary); border-radius: 12px; padding: 24px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card h3 { color: var(--text-secondary); font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .card .value { font-size: 2rem; font-weight: bold; color: var(--accent); }

        .balls-container { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .ball { width: 40px; height: 40px; border-radius: 50%; background-color: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; }
        .ball.star { background-color: var(--warning); color: #0f172a; }

        .btn { background-color: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background 0.3s; display: inline-flex; align-items: center; gap: 8px; }
        .btn:hover { background-color: var(--accent-hover); }
        .btn-success { background-color: var(--success); }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); }
        .form-control { width: 100%; padding: 12px; background-color: var(--bg-primary); border: 1px solid #475569; border-radius: 8px; color: var(--text-primary); font-size: 1rem; }

        .chart-container { position: relative; height: 300px; width: 100%; }

        .sorteio-card { background-color: var(--bg-card); border-radius: 8px; padding: 16px; margin-bottom: 15px; border-left: 3px solid var(--accent); }
        .sorteio-card h4 { color: var(--text-primary); font-size: 1rem; margin-bottom: 10px; }
        .sorteio-card .date { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 12px; }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 20px 10px; }
            .logo span, .nav-links a span { display: none; }
            .main-content { margin-left: 70px; padding: 20px; }
        }
    </style>
</head>

            <i class="fas fa-brain"></i>
            <span>Claudio AI</span>
        </div>
