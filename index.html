        // 4. Gerador de Chaves (Atualizado com botão de Salvar)
        function gerarChave(tipo) {
            let numeros = [], estrelas = [];
            let maxNum, qtdNum, maxEst, qtdEst;

            if (tipo === 'euromilhoes') { maxNum = 50; qtdNum = 5; maxEst = 12; qtdEst = 2; }
            else if (tipo === 'totoloto') { maxNum = 49; qtdNum = 5; maxEst = 13; qtdEst = 1; }
            else if (tipo === 'eurodreams') { maxNum = 40; qtdNum = 6; maxEst = 5; qtdEst = 1; }

            while (numeros.length < qtdNum) {
                let n = Math.floor(Math.random() * maxNum) + 1;
                if (!numeros.includes(n)) numeros.push(n);
            }
            numeros.sort((a, b) => a - b);

            while (estrelas.length < qtdEst) {
                let e = Math.floor(Math.random() * maxEst) + 1;
                if (!estrelas.includes(e)) estrelas.push(e);
            }
            estrelas.sort((a, b) => a - b);

            const prefix = tipo === 'euromilhoes' ? 'euro' : (tipo === 'totoloto' ? 'toto' : 'dream');
            const numContainer = document.getElementById(prefix + '-numeros');
            const estContainer = document.getElementById(prefix + '-estrelas');
            
            if (numContainer) {
                numContainer.innerHTML = numeros.map(n => `<div class="ball">${n}</div>`).join('');
            }
            if (estContainer) {
                let title = tipo === 'totoloto' ? 'Número da Sorte' : (tipo === 'eurodreams' ? 'Número Sonho' : 'Estrela');
                estContainer.innerHTML = estrelas.map(e => `<div class="ball star" title="${title}">${e}</div>`).join('');
            }

            // Adicionar botão de salvar dinamicamente
            const btnAntigo = document.getElementById('btn-salvar-gerado');
            if (btnAntigo) btnAntigo.remove();

            const btnSalvar = document.createElement('button');
            btnSalvar.id = 'btn-salvar-gerado';
            btnSalvar.className = 'btn';
            btnSalvar.style.marginTop = '15px';
            btnSalvar.style.width = '100%';
            btnSalvar.style.justifyContent = 'center';
            btnSalvar.innerHTML = '<i class="fas fa-bookmark"></i> Salvar esta Chave nos Favoritos';
            btnSalvar.onclick = () => {
                const numsGerados = Array.from(numContainer.children).map(el => parseInt(el.innerText));
                const starsGeradas = estContainer ? Array.from(estContainer.children).map(el => parseInt(el.innerText)) : [];
                salvarChaveFavorita(tipo, numsGerados, starsGeradas);
            };
            
            const targetContainer = estContainer || numContainer;
            targetContainer.parentNode.insertBefore(btnSalvar, targetContainer.nextSibling);
        }

        // 5. NOVO: Sistema de Notificações Toast
        function mostrarToast(mensagem, tipo = 'sucesso') {
            const toast = document.getElementById('toast-notificacao');
            const msgElement = document.getElementById('toast-mensagem');
            
            msgElement.innerText = mensagem;
            toast.style.backgroundColor = tipo === 'sucesso' ? 'var(--success)' : '#ef4444';
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 6. NOVO: Guardar Chave nos Favoritos (LocalStorage)
        function salvarChaveFavorita(jogo, numeros, estrelas) {
            let favoritos = JSON.parse(localStorage.getItem('claudioAI_favoritos')) || [];
            const novaChave = {
                id: Date.now(),
                jogo: jogo,
                numeros: numeros,
                estrelas: estrelas,
                data: new Date().toLocaleDateString('pt-PT')
            };
            favoritos.unshift(novaChave);
            localStorage.setItem('claudioAI_favoritos', JSON.stringify(favoritos));
            mostrarToast('✅ Chave guardada nos favoritos!');
            renderizarFavoritos();
        }

        function renderizarFavoritos() {
            const container = document.getElementById('lista-favoritos');
            if (!container) return;
            
            let favoritos = JSON.parse(localStorage.getItem('claudioAI_favoritos')) || [];
            
            if (favoritos.length === 0) {
                container.innerHTML = '<p style="color: var(--text-secondary); text-align: center; padding: 20px;">Ainda não guardou nenhuma chave. Gere uma chave e clique em "Salvar"!</p>';
                return;
            }

            container.innerHTML = favoritos.map(f => `
                <div class="sorteio-card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                    <div>
                        <h4 style="text-transform: capitalize; margin-bottom: 5px;">${f.jogo} <small style="color: var(--text-secondary); font-weight: normal;">(${f.data})</small></h4>
                        <div class="balls-container" style="margin: 5px 0;">
                            ${f.numeros.map(n => `<div class="ball" style="width: 30px; height: 30px; font-size: 0.9rem;">${n}</div>`).join('')}
                        </div>
                        ${f.estrelas.length > 0 ? `
                        <div class="balls-container" style="margin: 5px 0;">
                            ${f.estrelas.map(e => `<div class="ball star" style="width: 30px; height: 30px; font-size: 0.9rem;">${e}</div>`).join('')}
                        </div>` : ''}
                    </div>
                    <button class="btn" style="background-color: #ef4444; padding: 8px 12px; font-size: 0.9rem;" onclick="removerFavorito(${f.id})">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            `).join('');
        }
